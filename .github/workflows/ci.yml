name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write
  packages: write

jobs:
  test-windows:
    name: Test Windows Application
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd accounting_system_windows
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        cd accounting_system_windows
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html || echo "No tests found yet"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./accounting_system_windows/coverage.xml
        fail_ci_if_error: false

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint
    
    - name: Run Flake8
      run: |
        cd accounting_system_windows
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "No critical errors"
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || echo "Linting completed"

  build-windows:
    name: Build Windows Application
    runs-on: windows-latest
    needs: [test-windows, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd accounting_system_windows
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        cd accounting_system_windows
        pyinstaller --onefile --windowed --name "AccountingSystem" main.py
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: accounting_system_windows/dist/AccountingSystem.exe
        retention-days: 30

  build-android:
    name: Build Android Application
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build APK
      run: |
        cd accounting_system_android
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: accounting_system_android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-executable
        path: ./release-assets
    
    - name: Download Android artifact
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: ./release-assets
    
    - name: Get version
      id: version
      run: |
        VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        files: |
          release-assets/AccountingSystem.exe
          release-assets/app-release.apk
        body: |
          ## 会计管理系统 v${{ steps.version.outputs.version }}
          
          ### 更新内容
          - 修复已知问题
          - 优化系统性能
          - 改进用户体验
          
          ### 下载
          - **Windows端**: 下载 `AccountingSystem.exe`
          - **Android端**: 下载 `app-release.apk`
          
          ### 安装说明
          #### Windows
          1. 下载 `AccountingSystem.exe`
          2. 双击运行即可
          3. 默认账号: admin / admin123
          
          #### Android
          1. 下载 `app-release.apk`
          2. 在手机上安装APK文件
          3. 打开应用即可使用
