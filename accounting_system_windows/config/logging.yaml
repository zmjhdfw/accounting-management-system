# 日志配置
logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # 文件处理器
  file:
    enabled: true
    path: "./logs/app.log"
    max_size: 10485760  # 10MB
    backup_count: 5
    encoding: "utf-8"
    
  # 控制台处理器
  console:
    enabled: true
    level: "INFO"
    
  # 敏感信息脱敏
  desensitize:
    enabled: true
    fields:
      - "password"
      - "token"
      - "secret"
